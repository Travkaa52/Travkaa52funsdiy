# .github/workflows/bot.yml
name: Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 365
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Create project structure
        run: |
          mkdir -p database handlers utils config
          echo "✅ Структура проекта создана"
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Create database files
        run: |
          # Создаем database/db.py
          cat > database/db.py << 'EOF'
          import asyncpg
          import os
          import logging
          from typing import Optional, Dict, List
          
          logger = logging.getLogger(__name__)
          _pool: Optional[asyncpg.Pool] = None
          
          DATABASE_URL = os.getenv("DATABASE_URL")
          
          async def connect():
              global _pool
              if not _pool:
                  if not DATABASE_URL:
                      raise ValueError("DATABASE_URL not set")
                  _pool = await asyncpg.create_pool(DATABASE_URL, min_size=1, max_size=5)
                  logger.info("✅ Database connected")
              return _pool
          
          async def close():
              global _pool
              if _pool:
                  await _pool.close()
                  _pool = None
          
          async def execute(query: str, *args):
              pool = await connect()
              async with pool.acquire() as conn:
                  return await conn.execute(query, *args)
          
          async def fetch(query: str, *args) -> List[Dict]:
              pool = await connect()
              async with pool.acquire() as conn:
                  rows = await conn.fetch(query, *args)
                  return [dict(row) for row in rows]
          
          async def fetchone(query: str, *args) -> Optional[Dict]:
              pool = await connect()
              async with pool.acquire() as conn:
                  row = await conn.fetchrow(query, *args)
                  return dict(row) if row else None
          EOF
          
          # Создаем database/models.py
          cat > database/models.py << 'EOF'
          SCHEMAS = {
              'users': """
                  CREATE TABLE IF NOT EXISTS users (
                      id BIGINT PRIMARY KEY,
                      name TEXT,
                      username TEXT,
                      balance INT DEFAULT 0,
                      referrer BIGINT,
                      refs INT DEFAULT 0,
                      bought BOOL DEFAULT FALSE,
                      joined TIMESTAMP,
                      spent INT DEFAULT 0,
                      tariff TEXT DEFAULT 'free',
                      tariff_start TIMESTAMP,
                      tariff_end TIMESTAMP
                  )
              """,
              'orders': """
                  CREATE TABLE IF NOT EXISTS orders (
                      id TEXT PRIMARY KEY,
                      user_id BIGINT REFERENCES users(id),
                      tariff TEXT,
                      fio TEXT,
                      dob TEXT,
                      sex TEXT,
                      price INT,
                      promo TEXT,
                      discount INT DEFAULT 0,
                      final INT,
                      created TIMESTAMP,
                      status TEXT DEFAULT 'pending'
                  )
              """,
              'promocodes': """
                  CREATE TABLE IF NOT EXISTS promocodes (
                      code TEXT PRIMARY KEY,
                      type TEXT,
                      value INT,
                      max_uses INT DEFAULT 1,
                      used INT DEFAULT 0,
                      active BOOL DEFAULT TRUE,
                      expires TIMESTAMP
                  )
              """,
              'user_promos': """
                  CREATE TABLE IF NOT EXISTS user_promos (
                      user_id BIGINT REFERENCES users(id),
                      promo_code TEXT REFERENCES promocodes(code),
                      used_at TIMESTAMP,
                      PRIMARY KEY (user_id, promo_code)
                  )
              """
          }
          
          INDEXES = [
              "CREATE INDEX IF NOT EXISTS idx_users_tariff ON users(tariff)",
              "CREATE INDEX IF NOT EXISTS idx_orders_user ON orders(user_id)"
          ]
          
          DEFAULT_TARIFFS = """
              INSERT INTO tariffs (key, name, price, days, emoji, active) VALUES
                  ('day1', '🌙 1 день', 20, 1, '🌙', true),
                  ('day30', '📅 30 днів', 70, 30, '📅', true),
                  ('day90', '🌿 90 днів', 150, 90, '🌿', true),
                  ('day180', '🌟 180 днів', 190, 180, '🌟', true),
                  ('forever', '💎 Назавжди', 250, NULL, '💎', true)
              ON CONFLICT (key) DO NOTHING
          """
          EOF
          
          echo "✅ Файлы базы данных созданы"
      
      - name: Setup database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python setup_db.py
      
      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          NOTIFICATION_CHAT_ID: ${{ secrets.NOTIFICATION_CHAT_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python bot_main.py
        timeout-minutes: 350
